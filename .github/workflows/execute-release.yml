name: Execute v0.2.0 Release

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/execute-release.yml'

permissions:
  contents: write

concurrency:
  group: release-v0.2.0
  cancel-in-progress: true

jobs:
  release:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check whether v0.2.0 already exists
        id: guard
        run: |
          git fetch origin main --tags
          if git rev-parse -q --verify refs/tags/v0.2.0 >/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "v0.2.0 already exists; nothing to publish."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: npm ci

      - name: Configure release identity
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare v0.2.0 release commit and tag
        if: steps.guard.outputs.skip != 'true'
        id: version
        run: |
          node <<'NODE'
          const fs = require('fs');
          const targetVersion = '0.2.0';

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          if (!['0.1.50', targetVersion].includes(pkg.version)) {
            throw new Error(`Expected package version 0.1.50 or ${targetVersion}, got ${pkg.version}`);
          }
          pkg.version = targetVersion;
          pkg.repository = { type: 'git', url: 'https://github.com/GoryoDog/CursorRemote' };
          let packageText = JSON.stringify(pkg, null, 2) + '\n';
          packageText = packageText
            .replaceAll('https://github.com/len5ky/CursorRemote', 'https://github.com/GoryoDog/CursorRemote')
            .replaceAll('/blob/feature/discord-bot-transport/', '/blob/main/');
          fs.writeFileSync('package.json', packageText);

          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          lock.version = targetVersion;
          if (lock.packages && lock.packages['']) lock.packages[''].version = targetVersion;
          fs.writeFileSync('package-lock.json', JSON.stringify(lock, null, 2) + '\n');

          for (const path of ['README.md', 'docs/setup-guide.md']) {
            let text = fs.readFileSync(path, 'utf8');
            text = text
              .replaceAll('https://github.com/len5ky/CursorRemote', 'https://github.com/GoryoDog/CursorRemote')
              .replace(/cursor-remote-\d+\.\d+\.\d+\.vsix/g, `cursor-remote-${targetVersion}.vsix`);
            fs.writeFileSync(path, text);
          }

          let changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          if (!changelog.includes(`## [${targetVersion}]`)) {
            const section = `## [Unreleased]\n\n## [${targetVersion}] - 2026-07-10\n\n### Added\n- Discord Bot API transport with guild-scoped slash commands.\n- Discord approval/rejection buttons and optional Cursor response notifications.\n- Explicit Discord guild, channel, and user allowlist authorization.\n- Automated CI validation and verified VSIX release packaging.\n`;
            if (!changelog.includes('## [Unreleased]')) {
              throw new Error('CHANGELOG.md does not contain the Unreleased heading');
            }
            changelog = changelog.replace('## [Unreleased]', section);
            fs.writeFileSync('CHANGELOG.md', changelog);
          }
          NODE

          git add package.json package-lock.json CHANGELOG.md README.md docs/setup-guide.md
          if ! git diff --cached --quiet; then
            git commit -m "release: v0.2.0"
          fi

          git tag -a v0.2.0 -m "CursorRemote v0.2.0"
          echo "version=0.2.0" >> "$GITHUB_OUTPUT"

      - name: Reinstall from synchronized lockfile
        if: steps.guard.outputs.skip != 'true'
        run: npm ci

      - name: Run tests
        if: steps.guard.outputs.skip != 'true'
        run: npm test

      - name: Build server and web client
        if: steps.guard.outputs.skip != 'true'
        run: npm run build

      - name: Bundle Cursor extension
        if: steps.guard.outputs.skip != 'true'
        run: npm run build:ext

      - name: Package and verify VSIX
        if: steps.guard.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -o pipefail
          mkdir -p releases
          npx @vscode/vsce package --no-dependencies --out "releases/cursor-remote-${VERSION}.vsix" 2>&1 | tee /tmp/package.log
          npx tsx scripts/verify-vsix.ts "releases/cursor-remote-${VERSION}.vsix" 2>&1 | tee /tmp/verify.log
          (cd releases && sha256sum "cursor-remote-${VERSION}.vsix" > "cursor-remote-${VERSION}.vsix.sha256")

      - name: Push release commit and tag
        if: steps.guard.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            git push origin HEAD:main
          fi
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cat > RELEASE_NOTES.md <<EOF
          ## CursorRemote v${VERSION}

          This release adds Discord Bot API control alongside the existing web and Telegram transports.

          ### Discord integration
          - Guild-scoped `/cursor` slash commands
          - Send prompts and inspect Cursor state
          - Approve, reject, or accept all pending actions
          - Switch mode, model, chat tab, and Cursor window
          - Optional assistant-response and approval-card notifications
          - Explicit guild, channel, and user-ID authorization
          - No Message Content privileged intent required

          ### Validation
          - Node.js 20 CI
          - Unit tests
          - TypeScript/server build
          - Cursor extension bundle
          - VSIX content allowlist verification
          - SHA-256 checksum asset
          EOF

          gh release create "v${VERSION}" \
            "releases/cursor-remote-${VERSION}.vsix" \
            "releases/cursor-remote-${VERSION}.vsix.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --title "CursorRemote v${VERSION}" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag \
            --latest

      - name: Upload release files and diagnostics
        if: always() && steps.guard.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cursor-remote-v${{ steps.version.outputs.version }}-diagnostics
          path: |
            releases/
            /tmp/package.log
            /tmp/verify.log
          if-no-files-found: error
